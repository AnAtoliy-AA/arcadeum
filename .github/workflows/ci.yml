name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    env:
      CI: true
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Documentation Link Checker
        run: pnpm docs:check

      - name: Run Linting
        run: pnpm run lint

      - name: Run Type Check
        run: |
          pnpm --filter web type-check
          pnpm --filter mobile build

      - name: Run Web Unit Tests
        run: pnpm exec turbo run test --filter web --log-order=stream

      - name: Run Backend & Mobile Unit Tests
        run: pnpm exec turbo run test --filter be --filter mobile --log-order=stream -- --forceExit --detectOpenHandles --passWithNoTests

      - name: Run Backend E2E Tests
        env:
          MONGODB_URI: mongodb://localhost:27017/arcadeum_test
          JWT_SECRET: test_secret
        run: pnpm --filter be test:e2e

      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install --with-deps

      - name: Run Web E2E Tests
        run: pnpm --filter web test:e2e

      - name: Upload CI Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: |
            apps/web/playwright-report/
          retention-days: 30

      - name: Upload Broken Links Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-report
          path: |
            scripts/check-doc-links.js
            **/*.md
