name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
    types: [opened, synchronize, reopened]
permissions:
  contents: read

env:
  CI: true
  MONGODB_URI: mongodb://localhost:27017/arcadeum_test
  AUTH_JWT_SECRET: test_secret
  NEXT_PUBLIC_E2E: true
  NEXT_PUBLIC_AUTH_WEB_CLIENT_ID: dummy-client-id
  NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
  NEXT_PUBLIC_PRESENTATION_VIDEO_ID: dQw4w9WgXcQ
  NEXT_PUBLIC_SOCIAL_LINKEDIN: https://linkedin.com/company/arcadeum
  NEXT_PUBLIC_SOCIAL_X: https://x.com/arcadeum
  NEXT_PUBLIC_SOCIAL_INSTAGRAM: https://instagram.com/arcadeum
  NEXT_PUBLIC_SOCIAL_DISCORD: https://discord.gg/arcadeum

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Build
        run: pnpm exec turbo run build --filter web --filter be

      - name: Bundle Build Artifacts
        run: tar -cvf build-artifacts.tar apps/web/.next apps/be/dist

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: build-artifacts.tar
          retention-days: 1

  lint:
    name: Lint & Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Documentation Link Checker
        run: pnpm docs:check

      - name: Run Linting
        run: pnpm run lint

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Web Unit Tests
        run: pnpm exec turbo run test --filter web --log-order=stream -- --passWithNoTests

      - name: Run Backend & Mobile Unit Tests
        run: pnpm exec turbo run test --filter be --filter mobile --log-order=stream -- --forceExit --detectOpenHandles --passWithNoTests

  test-e2e-be:
    name: Backend E2E Tests
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run Backend E2E Tests
        run: pnpm --filter be test:e2e


  web-e2e:
    name: Web E2E (${{ matrix.project }}, Shard ${{ matrix.shard }}/4)
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, "Mobile Chrome", "Mobile Safari", "Tablet Safari"]
        shard: [1, 2, 3, 4]
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs

      - name: Extract Build Artifacts
        run: tar -xvf build-artifacts.tar

      - name: Verify Builds
        run: |
          ls -F apps/web/.next | head -n 5
          ls -F apps/be/dist | head -n 5

      - name: Determine Browser Engine
        id: engine
        run: |
          if [[ "${{ matrix.project }}" == "chromium" || "${{ matrix.project }}" == "Mobile Chrome" ]]; then
            echo "browser=chromium" >> $GITHUB_OUTPUT
          elif [[ "${{ matrix.project }}" == "firefox" ]]; then
            echo "browser=firefox" >> $GITHUB_OUTPUT
          else
            echo "browser=webkit" >> $GITHUB_OUTPUT
          fi

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.engine.outputs.browser }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-${{ steps.engine.outputs.browser }}-

      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install ${{ steps.engine.outputs.browser }} --with-deps

      - name: Run Web E2E Tests
        run: pnpm --filter web test:e2e --project="${{ matrix.project }}" --shard=${{ matrix.shard }}/4

      - name: Upload Shard Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-report-${{ matrix.project }}-${{ matrix.shard }}
          path: |
            apps/web/playwright-report/
          retention-days: 30
