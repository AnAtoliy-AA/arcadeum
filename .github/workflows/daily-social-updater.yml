name: Daily Develop Changelog Poster

on:
  schedule:
    - cron: '0 8 * * *' # Triggers at 8:00 AM UTC, then sleeps a random 0-2 hours
  workflow_dispatch: # Allows you to manually trigger this anytime from the GitHub "Actions" tab to test it

jobs:
  gather-and-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop branch
        run: git fetch origin develop

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install requests
        run: pip install requests

      - name: Collect and format commits
        run: |
          python - <<'EOF'
          import subprocess
          import json

          try:
              raw_commits = subprocess.check_output(
                  ['git', 'log', 'origin/develop', '--since=24 hours ago', '--pretty=format:%s'],
                  text=True
              )
          except Exception as e:
              print(f"Error fetching logs: {e}")
              raw_commits = ""

          if not raw_commits.strip():
              print("No updates found in the last 24 hours. Skipping social posts.")
              exit(0)

          skip_patterns = [
              "Merge pull request",
              "Merge remote-tracking",
              "chore: bump version",
              "chore: update changelog",
              "chore: start next minor",
          ]
          emoji_map = {
              "feat(web):": "✨",
              "feat(be):": "✅",
              "feat(ui):": "🎨",
              "feat:": "✨",
              "fix(web):": "🛠️",
              "fix(be):": "🔧",
              "fix(ui):": "🖌️",
              "fix:": "🛠️",
              "refactor(web):": "⚙️",
              "refactor(be):": "⚙️",
              "refactor:": "⚙️",
              "fix(web,critical):": "🚨",
          }

          clean_updates = []
          seen = set()
          for line in raw_commits.split('\n'):
              line = line.strip()
              if not line or any(p in line for p in skip_patterns) or line in seen:
                  continue
              seen.add(line)

              cleaned = line
              for prefix, emoji in emoji_map.items():
                  cleaned = cleaned.replace(prefix, emoji)
              clean_updates.append(f"- {cleaned}")

          if not clean_updates:
              print("No consumer-facing changes found today. Skipping.")
              exit(0)

          changelog_text = "\n".join(clean_updates[:15])
          with open('/tmp/changelog.txt', 'w') as f:
              f.write(changelog_text)
          print(f"Saved {len(clean_updates)} updates to /tmp/changelog.txt")
          EOF

      - name: Post to socials
        env:
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          FACEBOOK_ID: ${{ secrets.BUFFER_FACEBOOK_ID }}
          THREADS_ID: ${{ secrets.BUFFER_THREADS_ID }}
          LINKEDIN_ID: ${{ secrets.BUFFER_LINKEDIN_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import json
          import os
          import requests

          with open('/tmp/changelog.txt', 'r') as f:
              changelog_text = f.read()

          facebook_text = (
              f"🚀 Daily Development Update!\n\n"
              f"Here is a live look at what we added and optimized yesterday:\n\n"
              f"{changelog_text}\n\n"
              f"#buildinpublic #indiedev #gamedevelopment"
          )
          threads_text = (
              f"Another productive day in the books. Shipped yesterday:\n\n"
              f"{changelog_text}\n\n"
              f"What are you coding today? 🛠️"
          )

          if len(threads_text) > 480:
              threads_text = threads_text[:475] + "..."

          linkedin_text = (
              f"🚀 Daily Development Update\n\n"
              f"Here's what we shipped yesterday:\n\n"
              f"{changelog_text}\n\n"
              f"#buildinpublic #indiedev #gamedevelopment #softwareengineering"
          )

          buffer_token = os.environ.get('BUFFER_API_TOKEN', '')
          if buffer_token:
              buffer_url = "https://api.buffer.com"
              headers = {
                  "Authorization": f"Bearer {buffer_token}",
                  "Content-Type": "application/json",
              }

              channels = [
                  (os.environ.get('FACEBOOK_ID', ''), facebook_text, "Facebook", "post"),
                  (os.environ.get('THREADS_ID', ''), threads_text, "Threads", None),
                  (os.environ.get('LINKEDIN_ID', ''), linkedin_text, "LinkedIn", None),
              ]

              for channel_id, text, name, post_type in channels:
                  if not channel_id:
                      print(f"Skipping Buffer post to {name} — channel ID not set")
                      continue
                  query = """
                  mutation CreatePost($text: String!, $channelId: ChannelId!) {
                    createPost(input: {
                      text: $text
                      channelId: $channelId
                      schedulingType: automatic
                      mode: shareNow
                      assets: []
                      %(type_field)s
                    }) {
                      ... on PostActionSuccess {
                        post { id text status }
                      }
                      ... on MutationError {
                        message
                      }
                    }
                  }
                  """
                  type_field = f'type: "{post_type}"' if post_type else ""
                  query = query % {"type_field": type_field}
                  variables = {
                      "text": text,
                      "channelId": channel_id,
                  }
                  payload = {"query": query, "variables": variables}
                  resp = requests.post(buffer_url, headers=headers, json=payload)
                  print(f"{name} response: {resp.status_code} {resp.text}")
                  if resp.status_code == 200:
                      result = resp.json()
                      if "errors" in result:
                          print(f"Failed to post to {name}: {result['errors']}")
                      elif result.get("data", {}).get("createPost", {}).get("message"):
                          print(f"Failed to post to {name}: {result['data']['createPost']['message']}")
                      else:
                          print(f"Posted daily update to {name}")
                  else:
                      print(f"Failed to post to {name}: {resp.text}")
          else:
              print("BUFFER_API_TOKEN not set, skipping Buffer posts.")

          telegram_token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          telegram_chat = os.environ.get('TELEGRAM_CHAT_ID', '')
          if telegram_token and telegram_chat:
              telegram_text = (
                  f"🚀 <b>Daily Development Update</b>\n\n"
                  f"Shipped yesterday:\n\n"
                  f"<pre>{changelog_text}</pre>"
              )
              tg_resp = requests.post(
                  f"https://api.telegram.org/bot{telegram_token}/sendMessage",
                  data={"chat_id": telegram_chat, "text": telegram_text, "parse_mode": "HTML"},
              )
              if tg_resp.status_code == 200:
                  print("Posted daily update to Telegram")
              else:
                  print(f"Failed to post to Telegram: {tg_resp.text}")
          else:
              print("Telegram not configured, skipping.")

          EOF
