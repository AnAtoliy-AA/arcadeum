name: Docs Check

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  docs-check:
    name: Docs Check Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to detect file changes properly

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Documentation Link Checker
        run: pnpm docs:check

      - name: Upload Link Check Report (Optional)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: broken-links-report
          path: |
            scripts/check-doc-links.js
            **/*.md
