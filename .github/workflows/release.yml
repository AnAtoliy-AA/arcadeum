name: Release

on:
  push:
    branches: [ main ]
    tags: [ "v*.*.*" ]

env:
  NEXT_PUBLIC_E2E: 'true'
  E2E_PROD: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required to get full git history for auto-changelog

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm exec turbo run build --filter web --filter be

      - name: Install Playwright Browsers
        run: pnpm --filter web exec playwright install --with-deps

      - name: Run E2E Tests
        env:
          MONGODB_URI: mongodb://localhost:27017/arcadeum_test
          AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET || 'test_jwt_secret_key_for_e2e_only' }}
        run: pnpm --filter web test:e2e
