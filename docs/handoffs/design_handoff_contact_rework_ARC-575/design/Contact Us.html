<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Arcadeum — Contact Us · Reworked</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/tokens.css"/>
  <link rel="stylesheet" href="styles/variations.css"/>
  <link rel="stylesheet" href="styles/variation2-deep.css"/>
  <style>
    html, body { margin: 0; padding: 0; background: #0b0c0d; }
    body { font-family: 'Inter', sans-serif; color: #ecefee; }
    .stage-bg {
      min-height: 100vh;
      background:
        radial-gradient(60% 60% at 30% 10%, rgba(59,130,246,0.10), transparent 60%),
        radial-gradient(60% 60% at 80% 80%, rgba(126,58,242,0.10), transparent 60%),
        #0b0c0d;
    }
    /* The artboard wrapper paints the variation's own theme background */
    .ab-stage {
      position: relative;
      padding: 32px;
      min-height: 1200px;
      background: var(--bg);
      color: var(--color);
      isolation: isolate;
    }
    .ab-stage::before {
      content: "";
      position: absolute; inset: 0;
      background:
        radial-gradient(50% 50% at 20% 10%, var(--radial-a), transparent 60%),
        radial-gradient(50% 50% at 85% 90%, var(--radial-b), transparent 60%);
      pointer-events: none; z-index: 0;
    }
    .ab-stage > * { position: relative; z-index: 1; }
    .contact-shell { max-width: 1040px; margin: 0 auto; }
  </style>
</head>
<body class="stage-bg">
  <div id="root"></div>

  <script>
    /* eslint-disable */
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "v1_theme": "neonLight",
      "v1_layout": "two",
      "v1_hero": "bleed",
      "v1_faq": true,
      "v1_stats": true,
      "v2_theme": "neonDark",
      "v2_layout": "two",
      "v2_hero": "minimal",
      "v2_faq": true,
      "v2_stats": true,
      "v3_theme": "neonLight",
      "v3_layout": "one",
      "v3_hero": "bleed",
      "v3_faq": true,
      "v3_stats": true,
      "v4_theme": "tealDark",
      "v4_layout": "one",
      "v4_hero": "bleed",
      "v4_faq": true,
      "v4_stats": true
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="variation1.jsx"></script>
  <script type="text/babel" src="variation2.jsx"></script>
  <script type="text/babel" src="variation3.jsx"></script>
  <script type="text/babel" src="variation4.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle, TweakSelect } = window;

    const THEME_OPTIONS = [
      { value: "dark", label: "Default dark" },
      { value: "light", label: "Default light" },
      { value: "neonDark", label: "Neon dark" },
      { value: "neonLight", label: "Neon light" },
      { value: "violetDark", label: "Violet dark" },
      { value: "violetLight", label: "Violet light" },
      { value: "tealDark", label: "Teal dark" },
      { value: "tealLight", label: "Teal light" },
    ];

    function VariationFrame({ theme, children }) {
      return (
        <div className="ab-stage contact-root" data-theme={theme}>
          <div className="contact-shell">{children}</div>
        </div>
      );
    }

    function App() {
      const [t, setTweak] = useTweaks(window.TWEAK_DEFAULTS);

      const renderVariationTweaks = (n) => {
        const k = `v${n}_`;
        return (
          <TweakSection title={`Variation ${n}`}>
            <TweakSelect
              label="Theme"
              value={t[`${k}theme`]}
              options={THEME_OPTIONS}
              onChange={v => setTweak(`${k}theme`, v)}
            />
            <TweakRadio
              label="Layout"
              value={t[`${k}layout`]}
              options={[{value: "one", label: "Single col"}, {value: "two", label: "Two col"}]}
              onChange={v => setTweak(`${k}layout`, v)}
            />
            <TweakRadio
              label="Hero"
              value={t[`${k}hero`]}
              options={[{value: "minimal", label: "Minimal"}, {value: "bleed", label: "Bleed"}]}
              onChange={v => setTweak(`${k}hero`, v)}
            />
            <TweakToggle label="Show FAQ" value={t[`${k}faq`]} onChange={v => setTweak(`${k}faq`, v)} />
            <TweakToggle label="Show stats" value={t[`${k}stats`]} onChange={v => setTweak(`${k}stats`, v)} />
          </TweakSection>
        );
      };

      return (
        <>
          <DesignCanvas>
            <DCSection id="v1" title="Refined — closest to current shipped page">
              <DCArtboard id="ab-v1" label="01 · Refined (default dark)" width={1040} height={1480}>
                <VariationFrame theme={t.v1_theme}>
                  <Variation1 layout={t.v1_layout} showFAQ={t.v1_faq} showStats={t.v1_stats} hero={t.v1_hero}/>
                </VariationFrame>
              </DCArtboard>
            </DCSection>
            <DCSection id="v2" title="Neon Arcade — energetic, gaming-forward">
              <DCArtboard id="ab-v2" label="02 · Neon Arcade (neon dark)" width={1100} height={2200}>
                <VariationFrame theme={t.v2_theme}>
                  <Variation2 layout={t.v2_layout} showFAQ={t.v2_faq} showStats={t.v2_stats} hero={t.v2_hero}/>
                </VariationFrame>
              </DCArtboard>
            </DCSection>
            <DCSection id="v3" title="Channel-First — pick the right contact route">
              <DCArtboard id="ab-v3" label="03 · Channel-First (violet dark)" width={1040} height={1500}>
                <VariationFrame theme={t.v3_theme}>
                  <Variation3 layout={t.v3_layout} showFAQ={t.v3_faq} showStats={t.v3_stats} hero={t.v3_hero}/>
                </VariationFrame>
              </DCArtboard>
            </DCSection>
            <DCSection id="v4" title="Concierge — conversational, with smart FAQ suggestions">
              <DCArtboard id="ab-v4" label="04 · Concierge (teal dark)" width={800} height={1500}>
                <VariationFrame theme={t.v4_theme}>
                  <Variation4 layout={t.v4_layout} showFAQ={t.v4_faq} showStats={t.v4_stats} hero={t.v4_hero}/>
                </VariationFrame>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
          <TweaksPanel title="Tweaks">
            {renderVariationTweaks(1)}
            {renderVariationTweaks(2)}
            {renderVariationTweaks(3)}
            {renderVariationTweaks(4)}
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
